{{ define "main" }}
<section class="hero">
  <div class="hero-inner hero-split">
    <div class="hero-text">
      <h1 class="hero-headline">{{ .Title }}</h1>
      <div class="hero-content">
        {{ .Content }}
      </div>
    </div>
    <div class="hero-photo">
      <img src="/img/jen-kelleman.jpg" alt="Jen Kelleman — Content Designer, Speaker, Educator" class="headshot">
    </div>
  </div>
</section>
{{ end }}
